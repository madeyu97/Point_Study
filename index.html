/* ============ QUIZ ENGINE ============ */
function startQuiz(mount,items,opt,kind){
  combo=0;
  const sm=opt.sessionMode||'mixed';
  const newcap=ST.newCap||opt.newcap||12;
  let due=items.filter(it=>{const s=ST.srs[it.key];return s&&s.due<=now()});
  let neu=items.filter(it=>!ST.srs[it.key]);
  let later=items.filter(it=>{const s=ST.srs[it.key];return s&&s.due>now()});
  due.sort((a,b)=>((ST.srs[b.key].leech?1:0)-(ST.srs[a.key].leech?1:0))||(itemImp(b)-itemImp(a)));
  let queue;
  if(sm==='revise'){queue=shuffle(due).sort((a,b)=>((ST.srs[b.key].leech?1:0)-(ST.srs[a.key].leech?1:0))||(itemImp(b)-itemImp(a)))}
  else if(sm==='learn'){queue=opt.ordered?items.filter(it=>!ST.srs[it.key]):shuffle(neu).sort((a,b)=>itemImp(b)-itemImp(a)).slice(0,opt.cap||newcap)}
  else{let np=opt.excludeAux?neu.filter(it=>!isAux(it.key)):neu;np.sort((a,b)=>itemImp(b)-itemImp(a));queue=shuffle(due).concat(np.slice(0,newcap));if(!queue.length)queue=np.slice(0,newcap);if(!queue.length)queue=shuffle(later).slice(0,20)}
  if(opt.cap)queue=queue.slice(0,opt.cap);
  const learnMode=(sm==='learn');const met=new Set();
  if(!queue.length){
    const msg = sm==='learn' ? 'Every point here has been started — head to Revise to deepen them.'
              : sm==='revise' ? 'Nothing due right now. Learn some new points, or come back later.'
              : 'Nothing due in this deck right now.';
    mount.innerHTML=vhead(opt.title,opt.cn)+`<div class="done"><div class="han">畢</div><h2>${sm==='learn'?'All introduced':'All caught up'}</h2><p>${msg}</p><div class="actions" style="margin-top:16px">${sm==='revise'?'<button class="btn ghost" id="toLearn">Learn new</button>':''}<button class="btn primary" onclick="go('home')">Home</button></div></div>`;
    const tl=$('#toLearn');if(tl)tl.onclick=()=>openMode('learn');return}
  const total=queue.length;let idx=0,flipped=false,correctCount=0,xpEarned=0,maxCombo=0;
  mount.innerHTML=vhead(opt.title,opt.cn)+`
    <div class="qtop"><span class="qdeck" id="qdeck"></span><span class="combo" id="qcombo"></span><span class="spacer"></span><span class="qcount" id="qcount"></span></div>
    <div class="qprog"><i id="qbar"></i></div>
    <div class="card" id="qcard"></div>
    <div class="qctrl" id="qctrl"></div>`;
  const card=$('#qcard'),ctrl=$('#qctrl');
  function setCombo(){const c=$('#qcombo');if(combo>=2){c.textContent='Combo ×'+combo;c.classList.add('show');c.classList.toggle('hot',combo>=5)}else c.classList.remove('show','hot');if(combo>maxCombo)maxCombo=combo}
  function render(){const it=queue[idx];flipped=false;
    $('#qdeck').textContent=it.deck||opt.deck||'';$('#qcount').textContent=(idx+1)+' / '+total;$('#qbar').style.width=(idx/total*100)+'%';setCombo();
    card.className='card';void card.offsetWidth;card.classList.add('card');
    if(learnMode&&it.studyHTML){const pid=it.key.split(':')[0];if(!met.has(pid)){
      const t=tierOf(pid),rs=impReasons(pid);
      const badge=`<div class="tierbadge t${t}">${tierLabel(t)}${rs.length?' · '+esc(rs.slice(0,3).join(' · ')):''}</div>`;
      card.innerHTML=`<div class="tag">new · study</div>`+badge+it.studyHTML;
      ctrl.innerHTML=`<div class="actions"><button class="flipbtn" id="learnnext">Test me →</button></div>`;
      $('#learnnext').onclick=()=>{met.add(pid);sfx('tick');render()};return}}
    card.innerHTML=`<div class="tag">${it.tagText||opt.deck||''}</div><div class="crit" id="crit">★ Critical ×2</div>`+it.promptHTML;
    if(it.choices){const box=el('div','choices');
      it.choices.forEach((c,n)=>{const b=el('button','choice',`<b>${'ABCD'[n]}</b>${c.html}`);
        b.onclick=()=>{Array.from(box.children).forEach(x=>x.disabled=true);
          Array.from(box.children).forEach((x,j)=>{if(it.choices[j].correct)x.classList.add('correct')});
          if(!c.correct)b.classList.add('wrong');sfx(c.correct?'good':'again');
          const ans=el('div','');ans.style.marginTop='14px';ans.innerHTML=it.answerHTML||'';card.appendChild(ans);
          if(it.onReveal)try{it.onReveal(card)}catch(e){}
          showGrades(it,c.correct)};
        box.appendChild(b)});
      card.appendChild(box);ctrl.innerHTML=''}
    else{ctrl.innerHTML=`<div class="actions"><button class="flipbtn" id="flip">Reveal</button></div>`;
      $('#flip').onclick=()=>{if(flipped)return;flipped=true;card.classList.add('flip');sfx('tick');
        setTimeout(()=>{card.innerHTML=`<div class="tag">answer</div>`+it.answerHTML;if(it.onReveal)try{it.onReveal(card)}catch(e){}},190);showGrades(it)}}
  }
  function showGrades(it,mcqCorrect){
    setTimeout(()=>{
      const g=el('div','grades');
      g.innerHTML=`<button class="grade again" data-g="0">Again<small>&lt;1m</small></button>
        <button class="grade hard" data-g="1">Hard</button>
        <button class="grade good" data-g="2">Good</button>
        <button class="grade easy" data-g="3">Easy</button>`;
      ctrl.innerHTML='';const xf=el('div','xpfloat');xf.id='xpf';ctrl.appendChild(g);ctrl.appendChild(xf);
      g.querySelectorAll('.grade').forEach(b=>b.onclick=()=>{const gr=+b.dataset.g;
        if(gr>=2)combo++;else if(gr===0)combo=0;
        if(gr>=2)correctCount++;
        const xp=review(it.key,gr);xpEarned+=xp;
        sfx(gr===0?'again':gr===1?'hard':gr===3?'easy':'good');
        if(gr>=2){const cr=$('#crit');if(lastCrit&&cr){cr.classList.add('show')}
          const f=$('#xpf');if(f){f.textContent='+'+xp+(lastCrit?' ★':'');f.classList.remove('go');void f.offsetWidth;f.classList.add('go')}}
        if(combo>0&&combo%5===0)burst('gold',innerWidth/2,innerHeight*0.55);
        save();syncHeader();
        if(gr===0){queue.push(it)}
        setTimeout(next,lastCrit&&gr>=2?520:300)})
    },flipped&&!it.choices?210:0)
  }
  function next(){if(pendingLevel){const L=pendingLevel;pendingLevel=null;showLevelUp(L)}idx++;if(idx>=queue.length){finish();return}render()}
  function finish(){checkAch();save();syncHeader();$('#qbar').style.width='100%';
    const acc=total?Math.round(correctCount/total*100):0;
    mount.innerHTML=vhead(opt.title,opt.cn)+`<div class="done"><div class="han">畢</div><h2>Session complete</h2>
      <div class="stats"><div class="stat"><b>${total}</b><span>cards</span></div><div class="stat"><b>+${xpEarned}</b><span>XP</span></div><div class="stat"><b>×${maxCombo}</b><span>best combo</span></div><div class="stat"><b>${acc}%</b><span>recalled</span></div></div>
      <p style="color:var(--paper-faint)">Streak ${ST.streak} · ${reviseDueCount()} still due to revise.</p>
      <div class="actions" style="margin-top:18px"><button class="btn ghost" id="again">Another round</button><button class="btn primary" onclick="go('home')">Home</button></div></div>`;
    burst('gold');$('#again').onclick=()=>startQuiz(mount,items,opt,kind)}
  render()
}

/* ============ FLASHCARD SETUP ============ */
function setupFlash(mount,preChan){
  let sel=new Set(preChan?[preChan]:[CHAN[0]]);let dirs=new Set(['loc','func','name2loc','name2fn']);
  mount.innerHTML=vhead('Point Cards','抄錄')+`<div class="setup" id="su"></div>
    <div class="actions" style="justify-content:flex-start"><button class="btn primary" id="begin">Begin →</button><button class="btn ghost" id="all">All channels</button></div>`;
  const su=$('#su');
  function draw(){su.innerHTML='';
    const r1=el('div','row');r1.innerHTML='<label>Channels</label>';const ch=el('div','chips');
    CHAN.forEach(c=>{const x=el('div','chip'+(sel.has(c)?' on':''),`${esc(c)} <span>${DB.points.filter(p=>p.channel===c).length}</span>`);
      x.onclick=()=>{sel.has(c)?sel.delete(c):sel.add(c);draw()};ch.appendChild(x)});r1.appendChild(ch);su.appendChild(r1);
    const r2=el('div','row');r2.innerHTML='<label>Recall direction</label>';const dc=el('div','chips');
    Object.entries(DIRS).forEach(([k,d])=>{const x=el('div','chip jade'+(dirs.has(k)?' on':''),d.tag);
      x.onclick=()=>{dirs.has(k)?dirs.delete(k):dirs.add(k);draw()};dc.appendChild(x)});r2.appendChild(dc);su.appendChild(r2)}
  draw();
  $('#all').onclick=()=>{sel=(sel.size===CHAN.length)?new Set([CHAN[0]]):new Set(CHAN);draw()};
  $('#begin').onclick=()=>{if(!sel.size||!dirs.size){alert('Pick at least one channel and one direction.');return}
    startQuiz(mount,pointItems(DB.points.filter(p=>sel.has(p.channel)),[...dirs]),{title:'Point Cards',cn:'抄錄',deck:'Points',newcap:16})}
}

/* ============ COMMAND MATRIX ============ */
function renderMatrix(mount){
  const cats=[...new Set(DB.categoryNaming.map(c=>c.category))];const chans=[...new Set(DB.categoryNaming.map(c=>c.channel))];
  const cell={};DB.categoryNaming.forEach(c=>cell[c.channel+'|'+c.category]=c);
  mount.innerHTML=vhead('Command Matrix','五輸')+`
    <div class="setup"><div style="color:var(--paper-faint);font-size:14px">Tap any cell to reveal the point, or <b style="color:var(--gold)">quiz the whole grid</b> as spaced cards.</div>
    <div class="actions" style="justify-content:flex-start;margin-top:12px"><button class="btn primary" id="quizGrid">Quiz the grid →</button><button class="btn ghost" id="revealAll">Reveal all</button><button class="btn ghost" id="hideAll">Hide</button></div></div>
    <div class="matrix-wrap"><table class="matrix"><thead><tr><th class="ch"></th>${cats.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead>
    <tbody>${chans.map(ch=>`<tr><th class="ch">${esc(ch)}</th>${cats.map(cat=>{const c=cell[ch+'|'+cat];
      return c?`<td class="has" data-py="${esc(c.pinyin)}">·</td>`:'<td>—</td>'}).join('')}</tr>`).join('')}</tbody></table></div>`;
  const tds=mount.querySelectorAll('td.has');
  const reveal=td=>{const p=DB.points.find(x=>norm(x.pinyin)===norm(td.dataset.py));td.classList.add('rev');td.innerHTML=`${p?esc(p.hanzi):''}<span class="py">${esc(td.dataset.py)}</span>`};
  const hide=td=>{td.classList.remove('rev');td.innerHTML='·'};
  tds.forEach(td=>td.onclick=()=>td.classList.contains('rev')?hide(td):reveal(td));
  $('#revealAll').onclick=()=>tds.forEach(reveal);$('#hideAll').onclick=()=>tds.forEach(hide);
  $('#quizGrid').onclick=()=>startQuiz(mount,buildMatrix(),{title:'Command Matrix',cn:'五輸',deck:'Command Points',newcap:14})}

/* ============ CHARACTERS MODE ============ */
function renderChars(mount){let q='';
  const list=Object.keys(CHARS).sort();
  const charDue=()=>{let n=0;list.forEach(c=>{const s=ST.srs['hz:'+c];if(s&&s.due<=now())n++});return n};
  const seen=()=>list.filter(c=>ST.srs['hz:'+c]).length;
  function draw(){
    mount.innerHTML=vhead('Characters','漢字')+`
      <div class="setup"><div style="color:var(--paper-faint);font-size:14px">A side game, kept apart from your point study. ${list.length} characters drawn from the point names — learn them by radical, components and stroke order. <b style="color:var(--jade)">${seen()}</b> met · <b style="color:var(--seal)">${charDue()}</b> due.</div>
      <div class="actions" style="justify-content:flex-start;margin-top:12px"><button class="btn primary" id="play">Play ▸</button></div></div>
      <input class="search" id="csearch" placeholder="Search characters — by character, meaning or pinyin…" value="${esc(q)}">
      <div class="count" id="ccount"></div><div class="cgrid" id="cg"></div>`;
    $('#play').onclick=()=>startQuiz(mount,buildCharItems(),{title:'Characters',cn:'漢字',deck:'Characters',sessionMode:'mixed',newcap:14},'chars');
    $('#csearch').oninput=e=>{q=e.target.value.toLowerCase();fill()};
    fill();
  }
  function fill(){let l=list;
    if(q)l=list.filter(c=>(c+' '+(CHARS[c].m||'')+' '+(CHARS[c].p||'')).toLowerCase().includes(q));
    $('#ccount').textContent=l.length+' characters';
    const g=$('#cg');g.innerHTML='';
    l.forEach(c=>{const t=el('div','ctile'+(ST.srs['hz:'+c]?' seen':''));
      t.innerHTML=`<div class="h">${esc(c)}</div><div class="p">${esc(CHARS[c].p||'')}</div>`;
      t.onclick=()=>renderCharDetail(mount,c);g.appendChild(t)});
  }
  draw();
}
function renderCharDetail(mount,c){const o=CHARS[c]||{};
  const used=(o.used||[]).map(id=>ptById[id]).filter(Boolean);
  mount.innerHTML=`<div class="vhead"><button class="back" id="cback">‹ Characters</button><h2>Character<span class="cn">${esc(c)}</span></h2><div class="spacer"></div></div>
    <div class="cdetail">
      <div class="bighan" id="bighan" data-char="${esc(c)}"></div>
      <div class="py" style="font-size:30px">${esc(o.p||'')}</div>
      <div class="en" style="font-size:21px">${esc(o.m||'no gloss available')}</div>
      <div style="font-size:12px;color:var(--paper-faint);font-family:var(--disp);letter-spacing:1px;margin-top:6px">tap the character to replay strokes</div>
      <div class="extra" style="max-width:none"><div class="l">radical</div><div class="ex"><b style="font-family:var(--han);color:var(--gold);font-size:20px">${esc(o.r||'—')}</b> ${o.rm?'· '+esc(o.rm):''}</div></div>
      ${o.comp&&o.comp.length?`<div class="extra" style="max-width:none"><div class="l">components</div>${o.comp.map(k=>`<div class="ex"><b style="font-family:var(--han);color:var(--jade);font-size:20px">${esc(k.c)}</b> ${k.p?'<i>'+esc(k.p)+'</i> · ':''}${esc(k.m||'')}</div>`).join('')}</div>`:''}
      ${used.length?`<div class="extra" style="max-width:none"><div class="l">appears in ${used.length} point${used.length===1?'':'s'}</div><div class="cats">${used.map(p=>`<span>${esc(p.hanzi)} ${esc(p.pinyin)} ${p.code}-${p.num}</span>`).join('')}</div></div>`:''}
    </div>
    <div class="actions" style="justify-content:flex-start;margin-top:16px"><button class="btn primary" id="quizThis">Quiz characters ▸</button></div>`;
  $('#cback').onclick=()=>renderChars(mount);
  $('#quizThis').onclick=()=>startQuiz(mount,buildCharItems(),{title:'Characters',cn:'漢字',deck:'Characters',sessionMode:'mixed',newcap:14},'chars');
  const box=$('#bighan');if(box&&window.HanziWriter){try{const w=HanziWriter.create(box,c,{width:200,height:200,padding:10,strokeColor:'#efe4cf',radicalColor:'#d8af52',showOutline:true,outlineColor:'#4b3c2b',strokeAnimationSpeed:1,delayBetweenStrokes:180});w.animateCharacter();box.onclick=()=>w.animateCharacter()}catch(e){box.innerHTML=`<div class="hanzi">${esc(c)}</div>`}}else if(box){box.innerHTML=`<div class="hanzi">${esc(c)}</div>`}
}

/* ============ ATLAS ============ */
function renderAtlas(mount){let active='ALL',q='',sortImp=true;
  mount.innerHTML=vhead('Point Atlas','穴圖')+`<input class="search" id="search" placeholder="Search 409 points — pinyin, English, character, function, location…">
    <div class="chips" id="atabs" style="margin-bottom:8px"></div>
    <div class="chips" style="margin-bottom:13px"><div class="chip jade on" id="sortToggle">Sort: clinical priority</div></div>
    <div class="count" id="acount"></div><div id="alist"></div>`;
  const tabs=$('#atabs');['ALL',...CHAN].forEach(c=>{const x=el('div','chip'+(c===active?' on':''),c==='ALL'?'All':esc(c));
    x.onclick=()=>{active=c;[...tabs.children].forEach(n=>n.classList.remove('on'));x.classList.add('on');draw()};tabs.appendChild(x)});
  $('#search').oninput=e=>{q=e.target.value.toLowerCase();draw()};
  $('#sortToggle').onclick=()=>{sortImp=!sortImp;$('#sortToggle').textContent='Sort: '+(sortImp?'clinical priority':'channel order');$('#sortToggle').classList.toggle('on',sortImp);draw()};
  function draw(){let list=DB.points.filter(p=>active==='ALL'||p.channel===active);
    if(q)list=list.filter(p=>(p.pinyin+' '+p.english+' '+p.hanzi+' '+p.location+' '+p.functions.join(' ')+' '+p.categories.join(' ')).toLowerCase().includes(q));
    list=sortImp?list.slice().sort((a,b)=>priorityScore(b.id)-priorityScore(a.id)||(a.code<b.code?-1:1)||a.num-b.num):list.slice().sort((a,b)=>(a.code<b.code?-1:a.code>b.code?1:0)||a.num-b.num);
    $('#acount').textContent=list.length+' point'+(list.length===1?'':'s');const box=$('#alist');box.innerHTML='';
    list.slice(0,300).forEach(p=>{const d=el('div','pt');const t=tierOf(p.id);const pinned=!!(ST.pins&&ST.pins[p.id]);
      d.innerHTML=`<div class="top"><span class="han">${esc(p.hanzi)}</span><span class="py">${esc(p.pinyin)}</span>${p.english?`<span class="en">${esc(p.english)}</span>`:''}
        <span style="margin-left:auto;display:flex;align-items:center;gap:9px">${isEdited(p.id)?'<span class="echip">edited</span>':''}<span class="tchip t${t}">${tierLabel(t)}</span><span class="code">${p.code}-${p.num}</span><button class="star${pinned?' on':''}" data-pin="${p.id}" title="Pin as priority">${pinned?'★':'☆'}</button><button class="star" data-edit="${p.id}" title="Edit this point">✎</button></span></div>
        <div class="loc">${esc(p.location)}</div><div class="fns">${p.functions.map(f=>`<span>${esc(f)}</span>`).join('')}</div>
        ${p.categories.length?`<div class="roles">${p.categories.map(c=>`<span>${esc(c)}</span>`).join('')}</div>`:''}
        ${p.note?`<div class="loc" style="color:var(--gold)">✎ ${esc(p.note)}</div>`:''}
        <div class="editpanel" id="ep-${p.id}" style="display:none"></div>
        ${p.cautions.length?`<div class="caut">⚠ ${esc([...new Set(p.cautions.flatMap(c=>c.notes))].join(' · '))}</div>`:''}`;box.appendChild(d)});
    box.querySelectorAll('[data-pin]').forEach(b=>b.onclick=()=>{const id=b.dataset.pin;ST.pins=ST.pins||{};if(ST.pins[id])delete ST.pins[id];else ST.pins[id]=1;save();draw()});
    box.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>{const id=b.dataset.edit;const p=ptById[id];const ep=$('#ep-'+id);
      if(ep.style.display!=='none'){ep.style.display='none';ep.innerHTML='';return}
      ep.innerHTML=`
        <div class="erow"><label>Characters 漢字</label><input class="search ein" id="e-hz" value="${esc(p.hanzi)}"></div>
        <div class="erow"><label>Pinyin</label><input class="search ein" id="e-py" value="${esc(p.pinyin)}"></div>
        <div class="erow"><label>English name</label><input class="search ein" id="e-en" value="${esc(p.english)}"></div>
        <div class="erow"><label>Location</label><textarea class="search ein" id="e-loc" style="height:70px">${esc(p.location)}</textarea></div>
        <div class="erow"><label>Functions — one per line</label><textarea class="search ein" id="e-fn" style="height:88px">${esc(p.functions.join('\n'))}</textarea></div>
        <div class="erow"><label>Personal note (shows on study cards)</label><textarea class="search ein" id="e-note" style="height:52px">${esc(p.note||'')}</textarea></div>
        <div class="actions" style="justify-content:flex-start;gap:9px">
          <button class="btn primary" id="e-save">Save</button>
          <button class="btn ghost" id="e-cancel">Cancel</button>
          ${isEdited(id)?'<button class="btn ghost" id="e-restore" style="margin-left:auto;color:var(--seal)">Restore default</button>':''}
        </div>
        <div class="count" style="margin-top:7px">Changes apply everywhere this point appears — cards, maps, cases, clinic. Your study schedule is untouched. Defaults are always recoverable.</div>`;
      ep.style.display='block';
      $('#e-save').onclick=()=>{const py=($('#e-py').value||'').trim();
        if(!py){alert('Pinyin cannot be empty — it names the point across the app.');return}
        const fns=($('#e-fn').value||'').split('\n').map(s=>s.trim()).filter(Boolean);
        savePointEdit(id,{hanzi:($('#e-hz').value||'').trim(),pinyin:py,english:($('#e-en').value||'').trim(),location:($('#e-loc').value||'').trim(),functions:fns,note:$('#e-note').value||''});
        toast('改','Point updated',p.code+'-'+p.num+' — your version now shows everywhere.');draw()};
      $('#e-cancel').onclick=()=>{ep.style.display='none';ep.innerHTML=''};
      const er=$('#e-restore');if(er)er.onclick=()=>{if(confirm('Restore '+p.code+'-'+p.num+' to the built-in data? Your custom text and note for this point will be removed.')){restorePoint(id);toast('復','Default restored',p.code+'-'+p.num);draw()}};});
    if(list.length>300)box.appendChild(el('div','count','Showing first 300 — refine your search.'))}
  draw()}

renderHome();
